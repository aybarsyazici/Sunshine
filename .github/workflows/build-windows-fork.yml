name: Build Windows (Fork)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-ds5'

jobs:
  build_windows:
    name: Windows Build
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-cppwinrt
            mingw-w64-ucrt-x86_64-curl-winssl
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-graphviz
            mingw-w64-ucrt-x86_64-MinHook
            mingw-w64-ucrt-x86_64-miniupnpc
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nsis
            mingw-w64-ucrt-x86_64-onevpl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-toolchain

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup NodeJS PATH
        shell: pwsh
        run: |
          $nodePath = (Get-Command node).Source | Split-Path
          echo "NODEJS_PATH=$nodePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        shell: msys2 {0}
        run: |
          # Add NodeJS to PATH
          NODEJS_PATH=$(cygpath "$NODEJS_PATH")
          export PATH="$PATH:$NODEJS_PATH"

          mkdir build
          cd build
          cmake -G Ninja -DBUILD_DOCS=OFF ..
          ninja
          
      - name: Package
        shell: msys2 {0}
        run: |
          cd build
          cpack -G NSIS

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunshine-windows-ds5
          path: build/cpack_artifacts/Sunshine.exe
